apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  labels:
    app: web 
    
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: web  
  
  template:
    metadata:
      labels:
        app: web
        
    spec:
      containers:
      - name: myapp 
        image: dan0050/docker-app:latest 
        ports:
        - containerPort: 80 
